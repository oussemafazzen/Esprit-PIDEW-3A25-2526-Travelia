knp_snappy:
    pdf:
        enabled: true
        # On Windows (XAMPP): set WKHTMLTOPDF_PATH in .env.local to your local binary
        # On Railway (Linux): the wrapper script is installed at /usr/local/bin/wkhtmltopdf-wrapper
        binary: '%env(string:WKHTMLTOPDF_PATH)%'
        options:
            encoding: 'UTF-8'
            page-size: 'A4'
            margin-top: '12mm'
            margin-right: '10mm'
            margin-bottom: '12mm'
            margin-left: '10mm'
