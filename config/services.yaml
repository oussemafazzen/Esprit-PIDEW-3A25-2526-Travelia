parameters:
    serpapi.key: '%env(SERPAPI_KEY)%'
    flight.default_origin: '%env(FLIGHT_DEFAULT_ORIGIN)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\AmadeusFlightService:
        arguments:
            $apiKey: '%serpapi.key%'
            $defaultOrigin: '%flight.default_origin%'
